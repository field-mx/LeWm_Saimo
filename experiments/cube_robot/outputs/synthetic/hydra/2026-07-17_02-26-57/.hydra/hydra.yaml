hydra:
  run:
    dir: ${paths.output_dir}/hydra/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - eval.num_eval=1
    - eval.dataset_name=smoke/cube_random
    - eval.eval_budget=25
    - solver.num_samples=8
    - solver.n_steps=2
    - solver.topk=2
    - paths.output_dir=/home/muxiang/work/LeWm_Saimo/experiments/cube_robot/outputs/synthetic
    - output.filename=synthetic_results.txt
  job:
    name: eval_cube
    chdir: false
    override_dirname: eval.dataset_name=smoke/cube_random,eval.eval_budget=25,eval.num_eval=1,output.filename=synthetic_results.txt,paths.output_dir=/home/muxiang/work/LeWm_Saimo/experiments/cube_robot/outputs/synthetic,solver.n_steps=2,solver.num_samples=8,solver.topk=2
    id: ???
    num: ???
    config_name: cube
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.4
    version_base: '1.3'
    cwd: /home/muxiang/work/LeWm_Saimo/experiments/cube_robot
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/muxiang/work/LeWm_Saimo/experiments/cube_robot/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/muxiang/work/LeWm_Saimo/experiments/cube_robot/outputs/synthetic/hydra/2026-07-17_02-26-57
    choices:
      solver: cem
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
