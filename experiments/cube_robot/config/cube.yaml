defaults:
  - solver: cem
  - _self_

paths:
  root: /home/muxiang/work/LeWm_Saimo/experiments/cube_robot
  data_root: ${paths.root}/data
  model_dir: ${paths.root}/model/lewm-cube-mapped
  output_dir: ${paths.root}/outputs

world:
  env_name: swm/OGBCube-v0
  num_envs: ${eval.num_eval}
  max_episode_steps: ???
  env_type: single
  ob_type: states
  multiview: false
  width: 224
  height: 224
  visualize_info: false
  terminate_at_goal: true

dataset:
  keys_to_cache:
    - action

seed: 42
policy: ${paths.model_dir}

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5

eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: ogbench/cube_single_expert
  save_video: true
  callables:
    - method: set_state
      args:
        qpos:
          value: qpos
        qvel:
          value: qvel
    - method: set_target_pos
      args:
        cube_id:
          value: 0
          in_dataset: false
        target_pos:
          value: goal_privileged_block_0_pos
        target_quat:
          value: goal_privileged_block_0_quat

output:
  filename: cube_results.txt

hydra:
  job:
    chdir: false
  run:
    dir: ${paths.output_dir}/hydra/${now:%Y-%m-%d_%H-%M-%S}
