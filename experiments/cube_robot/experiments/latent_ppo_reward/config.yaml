paths:
  model_dir: ../../model/lewm-cube-mapped
  bc_actor_checkpoint: ../../outputs/actor_bc/actor_best.pt
  action_dataset: ../../data/ogbench_state/cube-single-play-v0.npz
  output_dir: outputs

seed: 42
device: cuda
image_size: 224

collection:
  episodes: 20
  max_steps: 200
  action_block: 5
  exploration_std: 0.15
  reuse_existing: true
  reward_distance_scale_m: 0.50
  success_bonus: 1.0

reward_training:
  epochs: 50
  batch_size: 256
  learning_rate: 0.0003
  hidden_dim: 256
  validation_fraction: 0.20

ppo:
  updates: 300
  num_envs: 64
  rollout_steps: 32
  imagination_horizon: 10
  update_epochs: 4
  minibatch_size: 512
  learning_rate: 0.00005
  bc_initialization_epochs: 20
  bc_initialization_batch_size: 256
  bc_initialization_learning_rate: 0.0003
  bc_anchor_coefficient: 0.10
  gamma: 0.95
  gae_lambda: 0.95
  clip_ratio: 0.20
  value_coefficient: 0.5
  entropy_coefficient: 0.0005
  max_grad_norm: 1.0
  action_penalty: 0.001
  predicted_success_reward: 1.20
  hidden_dim: 256

evaluation:
  episodes: 10
  max_steps: 200
  deterministic: true
  fps: 20
